<!DOCTYPE html>
<html>
<head>
    <title>Student Survey</title>
</head>
<body>
    <h2>College Survey Form</h2>

    <form action="/student-survey/submit" method="post">
        Name: <input type="text" name="name"><br><br>

        Department:
        <select name="dept">
            <option>CSE</option>
            <option>ISE</option>
            <option>ECE</option>
        </select><br><br>

        Rating (1-5):
        <input type="number" name="rating"><br><br>

        Feedback:
        <textarea name="feedback"></textarea><br><br>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
